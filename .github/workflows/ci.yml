name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-test-aot:
    name: ${{ matrix.os }} / ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install Native AOT prerequisites (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev

      - name: Restore
        run: dotnet restore Quark.slnx --verbosity minimal

      - name: Test
        run: dotnet test Quark.slnx --no-restore --verbosity minimal

      - name: Native AOT smoke publish
        run: dotnet publish src/Quark.Runtime/Quark.Runtime.csproj -f net10.0 -c Release -r ${{ matrix.rid }} /p:PublishAot=true --verbosity minimal
